<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backup Power Pro — Invoice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<!--
  CREATE TABLE SQL:

  create table if not exists invoices (
    id uuid default gen_random_uuid() primary key,
    token uuid default gen_random_uuid() unique not null,
    created_at timestamptz default now(),
    contact_id uuid references contacts(id) on delete set null,
    proposal_id uuid references proposals(id) on delete set null,
    contact_name text,
    contact_email text,
    contact_phone text,
    contact_address text,
    line_items jsonb not null default '[]',
    total numeric,
    status text default 'unpaid',
    paid_at timestamptz,
    payment_method text,
    notes text
  );
  alter table invoices enable row level security;
  create policy "anon all" on invoices for all using (true) with check (true);
-->
<style>
:root {
  --navy:#0b1f3b; --navy2:#1a3a5c; --gold:#ffba00;
  --green:#059669; --red:#dc2626; --border:#e4e8f0;
  --bg:#f4f6fa; --text:#1a2a42; --text2:#4a5568; --text3:#8a9ab5;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100%}

/* HEADER */
.site-header{background:var(--navy);padding:18px 24px;text-align:center}
.site-header .brand{font-family:'Outfit',sans-serif;font-weight:800;font-size:20px;color:#fff;letter-spacing:-.01em}
.site-header .brand span{color:var(--gold)}
.site-header .tagline{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}

/* PAGE */
.page{max-width:680px;margin:0 auto;padding:28px 20px 60px}

/* HERO */
.hero-card{background:var(--navy);border-radius:16px;padding:28px 28px 24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;background:var(--gold);opacity:.06;border-radius:50%}
.hero-eyebrow{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.hero-title{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;line-height:1.15;margin-bottom:6px}
.hero-sub{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:20px}
.hero-meta{display:flex;gap:20px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.12);padding-top:16px}
.hero-meta-item{min-width:0}
.hero-meta-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:3px;font-family:'Outfit',sans-serif}
.hero-meta-value{font-size:13px;font-weight:600;color:#fff;word-break:break-word}

/* CARD */
.card{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:16px;overflow:hidden}
.card-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-icon{width:32px;height:32px;border-radius:8px;background:#eff6ff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-head h2{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:var(--navy)}
.card-body{padding:18px 20px}

/* PRICING TABLE */
.price-table{width:100%;border-collapse:collapse;font-size:14px}
.price-table td{padding:11px 0;border-bottom:1px solid var(--border);vertical-align:top}
.price-table tr:last-child td{border-bottom:none}
.price-table td:last-child{text-align:right;font-weight:600;color:var(--text);white-space:nowrap}
.price-item-name{font-weight:500;color:var(--text)}
.price-total-row td{padding-top:14px;font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;color:var(--navy)}
.total-badge{background:var(--navy);color:var(--gold);font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;padding:5px 14px;border-radius:8px;display:inline-block}

/* STATUS BADGES */
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;letter-spacing:.03em}
.status-unpaid{background:#fef2f2;color:var(--red);border:1.5px solid #fecaca}
.status-paid{background:#f0fdf4;color:var(--green);border:1.5px solid #bbf7d0}

/* PAID BANNER */
.paid-banner{background:var(--green);border-radius:14px;padding:32px 24px;text-align:center;color:#fff;margin-bottom:16px}
.paid-icon{width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.paid-banner h2{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;margin-bottom:6px}
.paid-banner p{font-size:14px;opacity:.85}

/* BUTTONS */
.btn-pay{width:100%;padding:16px;background:var(--gold);color:var(--navy);border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.btn-pay:hover{filter:brightness(1.05);transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,186,0,.3)}
.dl-btn{width:100%;padding:14px;background:#fff;color:var(--navy);border:2px solid var(--navy);border-radius:10px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.dl-btn:hover{background:var(--navy);color:#fff}
.dl-btn:disabled{opacity:.6;pointer-events:none}

/* NOTES */
.notes-text{font-size:14px;color:var(--text2);line-height:1.6}

/* LOADING / ERROR */
.state-wrap{text-align:center;padding:60px 24px}
.state-wrap h2{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--navy);margin-bottom:8px}
.state-wrap p{font-size:14px;color:var(--text3)}
.spinner-large{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.site-footer{text-align:center;padding:28px 24px 24px;font-size:12px;color:var(--text3);border-top:1px solid var(--border);margin-top:20px}
.site-footer a{color:var(--text3);text-decoration:none}
.site-footer a:hover{color:var(--navy)}
.site-footer .cred-company{font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;color:var(--navy);margin-bottom:4px}
.site-footer .cred-address{margin-bottom:2px}
.site-footer .cred-license{font-weight:600;color:var(--text2);margin-top:6px}
.site-footer .cred-dba{font-size:11px;margin-top:2px}

/* RECEIPT INFO */
.receipt-row{display:flex;justify-content:space-between;padding:10px 0;font-size:13px}
.receipt-row:not(:last-child){border-bottom:1px solid var(--border)}
.receipt-label{color:var(--text3)}
.receipt-value{font-weight:600;color:var(--text)}

/* LEGAL / AGREEMENT */
.legal-section{background:#f8f9fb;border:1.5px solid var(--border);border-radius:10px;padding:16px 18px;margin-top:12px}
.legal-section-title{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.legal-row{display:flex;justify-content:space-between;padding:7px 0;font-size:12px;border-bottom:1px solid var(--border)}
.legal-row:last-child{border-bottom:none}
.legal-label{color:var(--text3)}
.legal-value{font-weight:600;color:var(--text);text-align:right;max-width:60%;word-break:break-word}
.legal-terms{font-size:12px;color:var(--text2);line-height:1.6;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-top:10px;max-height:200px;overflow-y:auto}
.legal-footer{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;line-height:1.5;font-style:italic}

@media(max-width:480px){
  .hero-title{font-size:22px}
  .hero-card{padding:24px 20px 20px}
  .hero-meta{gap:14px}
  .page{padding:16px 14px 48px}
}
</style>
</head>
<body>

<header class="site-header">
  <img src="/assets/images/logo-white-v2.png" alt="Backup Power Pro" style="height:32px;">
  <div class="tagline">Licensed Electrical Contractor &middot; SC LIC #2942 &middot; Upstate SC</div>
</header>

<main class="page" id="main">
  <div class="state-wrap">
    <div class="spinner-large"></div>
    <p>Loading your invoice...</p>
  </div>
</main>

<footer class="site-footer">
  <div class="cred-company">Key Electric LLC</div>
  <div class="cred-address">22 Kimbell CT, Greenville SC 29617</div>
  <div class="cred-address"><a href="tel:8644005302">(864) 400-5302</a> &nbsp;&middot;&nbsp; <a href="https://backuppowerpro.com">backuppowerpro.com</a></div>
  <div class="cred-license">SC Electrical Contractor License #2942 &nbsp;&middot;&nbsp; Fully Licensed &amp; Insured</div>
  <div class="cred-dba">DBA: Backup Power Pro</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = 'https://reowtzedjflwmlptupbk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4tYd9eFAYCTjnoKl1hbBBg_yyO9-vMB';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let INV = null; // invoice data
let LINKED_PROPOSAL = null; // linked proposal data (if any)

// ── INIT ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) { showError('No invoice found.', 'This link is missing an invoice token.'); return; }

  const { data, error } = await db.from('invoices').select('*').eq('token', token).single();
  if (error || !data) { showError('Invoice not found.', 'This link may be invalid or has been removed.'); return; }

  INV = data;

  // Load linked proposal if available
  if (INV.proposal_id) {
    try {
      const { data: propData } = await db.from('proposals').select('*').eq('id', INV.proposal_id).single();
      if (propData) LINKED_PROPOSAL = propData;
    } catch(e) {}
  }

  // Track view (skip if preview mode)
  const isPreview = new URLSearchParams(window.location.search).get('preview') === '1';
  if (!isPreview && INV.status !== 'cancelled' && INV.status !== 'paid') {
    db.from('invoices').update({
      viewed_at: new Date().toISOString(),
      view_count: (INV.view_count || 0) + 1,
    }).eq('token', token).then(() => {});
  }

  if (INV.status === 'cancelled') {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:16px">🚫</div><div style="font-family:Outfit,sans-serif;font-size:22px;font-weight:800;color:#0b1f3b;margin-bottom:8px">Invoice Cancelled</div><div style="font-size:14px;color:#8a9ab5;max-width:360px;margin:0 auto">This invoice has been cancelled and is no longer available for payment. Please contact Backup Power Pro at <a href="tel:8644005302" style="color:#3b82f6;font-weight:600">(864) 400-5302</a> if you have questions.</div></div>';
  } else if (INV.status === 'paid') {
    renderPaidInvoice();
  } else {
    renderInvoice();
  }
});

// ── HELPERS ─────────────────────────────────────────────────
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmt(n) { return '$' + Number(n || 0).toLocaleString('en-US'); }

function showError(title, msg) {
  document.getElementById('main').innerHTML = `
    <div class="state-wrap">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8a9ab5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <h2>${title}</h2>
      <p>${msg}</p>
    </div>`;
}

// ── BUILD AGREEMENT HTML (from linked proposal) ────────────
function buildAgreementHtml() {
  if (!LINKED_PROPOSAL || LINKED_PROPOSAL.status !== 'Approved') return '';

  const LP = LINKED_PROPOSAL;
  const signedTime = LP.signed_at
    ? new Date(LP.signed_at).toLocaleString('en-US', { month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true })
    : '';

  let termsDisplay = '';
  if (LP.approved_terms_snapshot) {
    try {
      const terms = typeof LP.approved_terms_snapshot === 'string' ? JSON.parse(LP.approved_terms_snapshot) : LP.approved_terms_snapshot;
      termsDisplay = `
        <div class="legal-terms">
          <strong>Scope & Pricing Acknowledged:</strong> ${esc(terms.contact_name)} approved a ${terms.selected_amp || '30'} Amp Connection System
          ${terms.selected_surge ? 'with whole-home surge protection' : 'without surge protection'} for a total of ${fmt(terms.total)}.
          <br><br><strong>Acknowledgments:</strong><br>
          ${terms.scope_acknowledged ? '&#10003; Reviewed and agreed to the scope of work and pricing.' : ''}<br>
          ${terms.safety_acknowledged ? '&#10003; Read and understood the Generator Safety Instructions.' : ''}
        </div>`;
    } catch(e) {
      termsDisplay = `<div class="legal-terms">${esc(LP.approved_terms_snapshot)}</div>`;
    }
  }

  return `
    <div class="card">
      <div class="card-head">
        <div class="card-icon" style="background:#f0fdf4"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <h2>Original Agreement</h2>
      </div>
      <div class="card-body">
        ${termsDisplay}

        <div class="legal-section" style="margin-top:14px">
          <div class="legal-section-title">Electronic Signature</div>
          <div class="legal-row">
            <span class="legal-label">Signed By</span>
            <span class="legal-value" style="font-size:16px;color:var(--navy)">${esc(LP.signer_name)}</span>
          </div>
          <div class="legal-row">
            <span class="legal-label">Date & Time</span>
            <span class="legal-value">${signedTime}</span>
          </div>
          <div class="legal-row">
            <span class="legal-label">IP Address</span>
            <span class="legal-value">${esc(LP.approved_ip || 'N/A')}</span>
          </div>
          <div class="legal-row">
            <span class="legal-label">Safety Instructions</span>
            <span class="legal-value">${LP.safety_ack ? '&#10003; Acknowledged' : 'Not acknowledged'}</span>
          </div>
        </div>

        <div class="legal-footer">
          This agreement was electronically signed under the ESIGN Act and constitutes a binding agreement between the parties.
        </div>
      </div>
    </div>`;
}

// ── RENDER UNPAID INVOICE ───────────────────────────────────
function renderInvoice() {
  const lineItems = INV.line_items || [];
  const total = INV.total || lineItems.reduce((s, li) => s + (li.amount || 0), 0);
  const createdDate = new Date(INV.created_at).toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });

  let lineItemRows = '';
  lineItems.forEach(li => {
    lineItemRows += `<tr><td class="price-item-name">${esc(li.name)}</td><td>${fmt(li.amount)}</td></tr>`;
  });

  const notesHtml = INV.notes ? `
    <div class="card">
      <div class="card-head">
        <div class="card-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <h2>Notes</h2>
      </div>
      <div class="card-body notes-text">${esc(INV.notes)}</div>
    </div>` : '';

  document.getElementById('main').innerHTML = `
    <!-- Hero -->
    <div class="hero-card">
      <div class="hero-eyebrow">Invoice</div>
      <div class="hero-title">Backup Power Pro</div>
      <div class="hero-sub">Key Electric LLC &middot; 22 Kimbell CT, Greenville SC 29617</div>
      <div class="hero-meta">
        <div class="hero-meta-item">
          <div class="hero-meta-label">Bill To</div>
          <div class="hero-meta-value">${esc(INV.contact_name)}</div>
        </div>
        ${INV.contact_address ? `<div class="hero-meta-item">
          <div class="hero-meta-label">Address</div>
          <div class="hero-meta-value">${esc(INV.contact_address)}</div>
        </div>` : ''}
        <div class="hero-meta-item">
          <div class="hero-meta-label">Date</div>
          <div class="hero-meta-value">${createdDate}</div>
        </div>
        <div class="hero-meta-item">
          <div class="hero-meta-label">Status</div>
          <div class="hero-meta-value"><span class="status-badge status-unpaid">Unpaid</span></div>
        </div>
      </div>
    </div>

    <!-- Contact Info -->
    ${(INV.contact_phone || INV.contact_email) ? `
    <div class="card">
      <div class="card-head">
        <div class="card-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <h2>Customer Details</h2>
      </div>
      <div class="card-body">
        <div style="font-size:14px;line-height:1.8;color:var(--text2)">
          ${INV.contact_phone ? `<div>${esc(INV.contact_phone)}</div>` : ''}
          ${INV.contact_email ? `<div>${esc(INV.contact_email)}</div>` : ''}
        </div>
      </div>
    </div>` : ''}

    <!-- Line Items -->
    <div class="card">
      <div class="card-head">
        <div class="card-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <h2>Invoice Details</h2>
      </div>
      <div class="card-body">
        <div style="font-size:13px;color:var(--green);font-weight:600;text-align:center;margin-bottom:14px;line-height:1.5">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:3px"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          This is your final price &mdash; everything is included: materials, permit, inspection, and cleanup.
        </div>
        <table class="price-table">
          ${lineItemRows}
          <tr class="price-total-row">
            <td>Total Due</td>
            <td><span class="total-badge">${fmt(total)}</span></td>
          </tr>
        </table>
      </div>
    </div>

    ${notesHtml}

    ${buildAgreementHtml()}

    <!-- Payment Info -->
    <div style="text-align:center;padding:16px 20px;font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:8px">
      Payment is collected on completion day after your system is installed and you're 100% satisfied.
      <div style="margin-top:8px;font-size:13px;color:var(--text3)">Questions? Call or text Key at <a href="tel:8644005302" style="color:var(--navy);font-weight:600;text-decoration:none">(864) 400-5302</a></div>
    </div>

    <!-- Pay Online Button -->
    <button class="btn-pay" onclick="payOnline()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Pay Online &mdash; ${fmt(total)}
    </button>

    <!-- Download Invoice PDF -->
    <button class="dl-btn" onclick="downloadInvoicePDF()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Invoice PDF
    </button>

    <div style="font-size:12px;color:var(--text3);text-align:center;line-height:1.6;margin-top:8px">
      Questions? Call or text <strong style="color:var(--navy)">(864) 400-5302</strong>
    </div>
  `;
}

// ── RENDER PAID INVOICE ─────────────────────────────────────
function renderPaidInvoice() {
  const lineItems = INV.line_items || [];
  const total = INV.total || lineItems.reduce((s, li) => s + (li.amount || 0), 0);
  const createdDate = new Date(INV.created_at).toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
  const paidDate = INV.paid_at
    ? new Date(INV.paid_at).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })
    : 'N/A';

  let lineItemRows = '';
  lineItems.forEach(li => {
    lineItemRows += `<tr><td class="price-item-name">${esc(li.name)}</td><td>${fmt(li.amount)}</td></tr>`;
  });

  document.getElementById('main').innerHTML = `
    <!-- Paid Banner -->
    <div class="paid-banner">
      <div class="paid-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Thank You for Choosing Backup Power Pro!</h2>

function downloadInvoicePDF() {

// ── DOWNLOAD RECEIPT PDF ────────────────────────────────────
function downloadReceiptPDF() {

}

// ── BUILD PDF ───────────────────────────────────────────────
function buildPDF(docTitle, isPaid) {
  const jsPDF = window.jspdf.jsPDF;
  const doc = new jsPDF();
  const navy = [11, 31, 59];
  const gold = [255, 186, 0];
  const green = [5, 150, 105];
  const lineItems = INV.line_items || [];
  const total = INV.total || lineItems.reduce((s, li) => s + (li.amount || 0), 0);

  // Determine title
  let headerTitle = docTitle;
  if (isPaid) headerTitle = 'RECEIPT \u2014 PAID IN FULL';

  // Navy header bar
  doc.setFillColor(navy[0], navy[1], navy[2]);
  doc.rect(0, 0, 210, 40, 'F');

  // Title
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(isPaid ? 18 : 22);
  doc.setFont('helvetica', 'bold');
  doc.text(headerTitle, 20, 22);

  // Company info
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('Key Electric LLC  \u2014  DBA: Backup Power Pro', 20, 30);
  doc.text('22 Kimbell CT, Greenville SC 29617', 20, 35);
  doc.setTextColor(gold[0], gold[1], gold[2]);
  doc.text('(864) 400-5302', 150, 30);
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(8);
  doc.text('SC Electrical Contractor License #2942 \u2014 Fully Licensed & Insured', 150, 35);

  // PAID watermark (for receipts)
  if (isPaid) {
    doc.setTextColor(5, 150, 105);
    doc.setFontSize(60);
    doc.setFont('helvetica', 'bold');
    doc.setGState(new doc.GState({ opacity: 0.08 }));
    doc.text('PAID', 105, 160, { align: 'center', angle: 35 });
    doc.setGState(new doc.GState({ opacity: 1 }));
  }

  // Bill To section
  doc.setTextColor(navy[0], navy[1], navy[2]);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text('Bill To:', 20, 52);
  doc.setFont('helvetica', 'normal');
  let billY = 58;
  if (INV.contact_name) { doc.text(INV.contact_name, 20, billY); billY += 6; }
  if (INV.contact_address) { doc.text(INV.contact_address, 20, billY); billY += 6; }
  if (INV.contact_phone) { doc.text(INV.contact_phone, 20, billY); billY += 6; }
  if (INV.contact_email) { doc.text(INV.contact_email, 20, billY); billY += 6; }

  // Date section (right side)
  doc.setFont('helvetica', 'bold');
  doc.text('Date:', 150, 52);
  doc.setFont('helvetica', 'normal');
  doc.text(new Date(INV.created_at).toLocaleDateString(), 150, 58);

  if (isPaid && INV.paid_at) {
    doc.setFont('helvetica', 'bold');
    doc.text('Paid:', 150, 64);
    doc.setFont('helvetica', 'normal');
    doc.text(new Date(INV.paid_at).toLocaleDateString(), 150, 70);
    if (INV.payment_method) {
      doc.setFont('helvetica', 'bold');
      doc.text('Method:', 150, 76);
      doc.setFont('helvetica', 'normal');
      doc.text(INV.payment_method, 150, 82);
    }
  }

  // Status badge
  if (isPaid) {
    const badgeY = INV.payment_method ? 88 : 74;
    doc.setFillColor(green[0], green[1], green[2]);
    doc.roundedRect(150, badgeY, 30, 10, 2, 2, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text('PAID', 165, badgeY + 7, { align: 'center' });
  }

  // Line items table header
  let y = 95;
  doc.setFillColor(240, 244, 250);
  doc.rect(20, y - 6, 170, 10, 'F');
  doc.setTextColor(navy[0], navy[1], navy[2]);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.text('Description', 22, y);
  doc.text('Amount', 170, y, { align: 'right' });
  y += 10;

  // Line items
  doc.setFont('helvetica', 'normal');
  lineItems.forEach(li => {
    if (li.name && li.amount) {
      doc.text(li.name, 22, y);
      doc.text('$' + Number(li.amount).toLocaleString(), 170, y, { align: 'right' });
      y += 8;
    }
  });

  // Total line
  y += 4;
  doc.setDrawColor(navy[0], navy[1], navy[2]);
  doc.line(20, y, 190, y);
  y += 8;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.text('Total: $' + Number(total).toLocaleString(), 170, y, { align: 'right' });

  // Footer note
  y += 16;
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(100, 100, 100);
  if (isPaid) {
    doc.text('This receipt confirms payment has been received for the services described above.', 20, y);
  } else {
    doc.text('Payment due upon completion. Price includes all materials, permit, and inspection.', 20, y);
  }

  // Notes
  if (INV.notes) {
    y += 12;
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(navy[0], navy[1], navy[2]);
    doc.setFontSize(10);
    doc.text('Notes:', 20, y);
    y += 6;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(100, 100, 100);
    const noteLines = doc.splitTextToSize(INV.notes, 170);
    doc.text(noteLines, 20, y);
    y += noteLines.length * 5;
  }

  // ── ORIGINAL AGREEMENT (from linked proposal) ──────────────
  if (LINKED_PROPOSAL && LINKED_PROPOSAL.status === 'Approved') {
    const LP = LINKED_PROPOSAL;

    // Check if we have room on current page, otherwise add new page
    if (y > 200) {
      // Add footer to current page
      addFooterBar(doc, navy, gold);
      doc.addPage();
      y = 20;
    }

    y += 10;
    doc.setFillColor(240, 244, 250);
    doc.rect(20, y - 6, 170, 10, 'F');
    doc.setTextColor(navy[0], navy[1], navy[2]);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text('ORIGINAL AGREEMENT', 22, y);
    y += 12;

    // Terms summary
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(80, 80, 80);

    let termsText = '';
    if (LP.approved_terms_snapshot) {
      try {
        const terms = typeof LP.approved_terms_snapshot === 'string' ? JSON.parse(LP.approved_terms_snapshot) : LP.approved_terms_snapshot;
        termsText = (terms.contact_name || LP.contact_name || '') + ' approved a ' + (terms.selected_amp || '30') + ' Amp Connection System ' +
          (terms.selected_surge ? 'with whole-home surge protection' : 'without surge protection') +
          ' for a total of $' + Number(terms.total || LP.total || 0).toLocaleString() + '. ' +
          'Scope of work and pricing were reviewed and agreed to. Generator Safety Instructions were acknowledged.';
      } catch(e) {
        termsText = String(LP.approved_terms_snapshot).substring(0, 300);
      }
    }

    if (termsText) {
      const tLines = doc.splitTextToSize(termsText, 170);
      doc.text(tLines, 22, y);
      y += tLines.length * 4.5 + 6;
    }

    // Signature details
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(navy[0], navy[1], navy[2]);
    doc.setFontSize(9);
    doc.text('Electronically signed by:', 22, y);
    doc.setFont('helvetica', 'normal');
    doc.text(LP.signer_name || 'N/A', 80, y);
    y += 6;

    doc.setFont('helvetica', 'bold');
    doc.text('Date:', 22, y);
    doc.setFont('helvetica', 'normal');
    const sigDate = LP.signed_at ? new Date(LP.signed_at).toLocaleString('en-US', { month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }) : 'N/A';
    doc.text(sigDate, 80, y);
    y += 6;

    doc.setFont('helvetica', 'bold');
    doc.text('IP Address:', 22, y);
    doc.setFont('helvetica', 'normal');
    doc.text(LP.approved_ip || 'N/A', 80, y);
    y += 6;

    doc.setFont('helvetica', 'bold');
    doc.text('Browser:', 22, y);
    doc.setFont('helvetica', 'normal');
    const uaText = LP.approved_user_agent ? LP.approved_user_agent.substring(0, 80) : 'N/A';
    const uaLines = doc.splitTextToSize(uaText, 110);
    doc.setFontSize(7);
    doc.text(uaLines, 80, y);
    doc.setFontSize(9);
    y += uaLines.length * 4 + 6;

    doc.setFont('helvetica', 'bold');
    doc.text('Safety Instructions:', 22, y);
    doc.setFont('helvetica', 'normal');
    doc.text(LP.safety_ack ? 'Acknowledged' : 'Not acknowledged', 80, y);
    y += 10;

    // Legal note
    doc.setFontSize(8);
    doc.setTextColor(120, 120, 120);
    doc.setFont('helvetica', 'italic');
    const legalText = 'This document constitutes a binding agreement between the parties under the Electronic Signatures in Global and National Commerce Act (ESIGN Act).';
    const legalLines = doc.splitTextToSize(legalText, 170);
    doc.text(legalLines, 22, y);
  }

  // Navy footer bar
  addFooterBar(doc, navy, gold);

  const prefix = isPaid ? 'Receipt' : 'Invoice';
  doc.save(prefix + '-' + (INV.contact_name || 'Customer').replace(/\s+/g, '-') + '.pdf');
}

function addFooterBar(doc, navy, gold) {
  doc.setFillColor(navy[0], navy[1], navy[2]);
  doc.rect(0, 277, 210, 20, 'F');
  doc.setTextColor(gold[0], gold[1], gold[2]);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.text('Key Electric LLC  \u2014  backuppowerpro.com  \u2014  (864) 400-5302', 105, 286, { align: 'center' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7);
  doc.setTextColor(255, 255, 255);
  doc.text('22 Kimbell CT, Greenville SC 29617  |  SC Electrical Contractor License #2942  |  Fully Licensed & Insured  |  DBA: Backup Power Pro', 105, 292, { align: 'center' });
}
