<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0;url=/crm/v3/">
<link rel="canonical" href="https://backuppowerpro.com/crm/v3/">
<title>BPP CRM</title>
<script>
  // v2 is retired. Bounce to v3, but FIRST unregister the v2 service
  // worker + clear all SW caches so cached shells stop ghosting the
  // user. Without this, dock shortcuts that ever touched /crm/v2/
  // keep serving the cached v2 page even after this file is updated.
  (function(){
    const go = function(){ location.replace('/crm/v3/'); };
    if (!('serviceWorker' in navigator)) return go();
    Promise.all([
      navigator.serviceWorker.getRegistrations()
        .then(rs => Promise.all(rs.map(r => r.unregister().catch(() => null))))
        .catch(() => null),
      ('caches' in self)
        ? caches.keys().then(ns => Promise.all(ns.map(n => caches.delete(n).catch(() => null))))
        : Promise.resolve(),
    ]).then(go, go);
    // Hard fallback if the cleanup hangs for any reason.
    setTimeout(go, 1500);
  })();
</script>
</head>
<body></body>
</html>
