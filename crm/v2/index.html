<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<link rel="icon" href="/assets/images/logo-main.png" />

  html, body { height: 100%; background: var(--bg); }

</style>
</head>
<body>

<a href="#main" class="skip-link">Skip to content</a>
<div id="app"></div>

<script>
  // Suppress Babel-standalone's "code generator deoptimised" perf notice.
  // It fires at error level whenever a JSX file is over 500KB, but it is
  // NOT a runtime error — the code still runs fine. The notice was flooding
  // the dev console with what looked like real errors (Key, 2026-04-25).
  // We also filter the matching "in-browser Babel transformer" warning since
  // we're knowingly running Babel in the browser for now.
  (function() {
    const origError = console.error;
    const origWarn  = console.warn;
    console.error = function(...args) {
      const first = args[0];
      if (typeof first === 'string' && /\[BABEL\] Note: The code generator has deoptimised/.test(first)) return;
      return origError.apply(console, args);
    };
    console.warn = function(...args) {
      const first = args[0];
      if (typeof first === 'string' && /You are using the in-browser Babel transformer/.test(first)) return;
      return origWarn.apply(console, args);
    };
  })();

  // Register service worker (crm/v2/sw.js) for offline shell + faster reloads.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/crm/v2/sw.js', { scope: '/crm/v2/' }).catch(() => {});
    });
  }
</script>

<!-- React 18 + Babel standalone (matches Claude Design's export runtime) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Supabase v2 JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" crossorigin="anonymous"></script>

<!-- Design system components (order matters — shell first, then data-specific) -->
<script type="text/babel" src="shell.jsx"></script>

<!-- Live app orchestrator — queries Supabase, wires auth, routes tabs, handles morphing bar -->
<script type="text/babel" src="app.jsx"></script>

</body>
