<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!-- viewport-fit=cover: extend layout into safe areas (notch + chin).
     interactive-widget=resizes-content (iOS 16+): when the keyboard opens,
     SHRINK the layout viewport instead of scrolling the document up. With
     this, html height: 100% becomes "viewport-minus-keyboard" automatically
     so the page doesn't shift. Without it, iOS scrolls the entire document
     up to keep focused inputs visible. -->
<!-- maximum-scale=1, user-scalable=no: prevent iOS zoom-on-focus when
     tapping inputs. iOS auto-zooms if input font-size < 16px or if user
     pinches; we want neither in this app. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
<!-- v10.1.16: Cache-control headers from GitHub Pages set max-age=600 on
     this HTML, which means iOS Safari won't even ask for a fresh copy for
     10 minutes after a deploy — pull-to-refresh is a no-op. These meta
     equivs override that on the page level so subsequent loads always
     check for a new version. Doesn't help the FIRST load after this
     deploys (already cached at the edge), but prevents the problem
     compounding on every future deploy. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>BPP CRM</title>
<!-- Defensive cleanup: v2 had a service worker that aggressively cached
     its shell. If a user ever loaded /crm/v2/ they may still have a
     v2 SW registered which can ghost the v3 page on subsequent visits.
     Unregister any registrations we own + clear caches on every v3
     load. Cheap (no-op if there's nothing to clean), and idempotent. -->
<script>
  (function(){
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){ try { r.unregister(); } catch(e) {} });
    }).catch(function(){});
    if ('caches' in self) {
      caches.keys().then(function(ns){
        ns.forEach(function(n){ try { caches.delete(n); } catch(e) {} });
      }).catch(function(){});
    }
  })();
</script>
<!-- Tab favicon (browser bookmark, history, dock when minimized). -->
<link rel="icon" href="/favicon.png" type="image/png" />
<!-- iOS "Add to Home Screen" + macOS Safari Dock icon. -->
<link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.jpg" />
<!-- High-DPI hint so Android / Chrome desktop pick the 192px asset. -->
<link rel="icon" href="/assets/images/icon-192.png" sizes="192x192" type="image/png" />
<!-- PWA manifest — CRM-scoped so "Add to Dock" / "Add to Home Screen"
     opens /crm/v3/ on launch, not the public landing page. -->
<link rel="manifest" href="/crm/v3/site.webmanifest" />
<meta name="theme-color" content="#0b1f3b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BPP CRM" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script>
  window.BPP_VERSION = '114';
  // v10.1.28: gold-standard pattern + iOS programmatic-scroll defense.
  //
  // Real iPhone test on v=109 showed iOS still scrolls window on input
  // focus despite touch-action:none on body. Adding a hard scrollTo(0,0)
  // pin via scroll listener — iOS scrolls, we snap back. Also pin via
  // requestAnimationFrame loop while an input is focused, since iOS
  // sometimes scrolls between scroll events.
  (function(){
    if (typeof window === 'undefined') return;
    var vv = window.visualViewport;
    function setVVH() {
      var h = vv ? vv.height : window.innerHeight;
      document.documentElement.style.setProperty('--vvh', h + 'px');
      document.documentElement.style.setProperty(
        '--vvs', h < 600 ? '0px' : 'env(safe-area-inset-bottom)'
      );
    }
    setVVH();
    if (vv) vv.addEventListener('resize', setVVH);
    window.addEventListener('resize', setVVH);
    window.addEventListener('orientationchange', setVVH);

    // Hard pin window scroll to (0,0). Fires on every iOS auto-scroll attempt.
    var snap = function(){
      if (window.scrollY !== 0 || window.scrollX !== 0) window.scrollTo(0, 0);
      // Also pin documentElement.scrollTop — iOS sometimes scrolls that
      // instead of the window in standalone PWA.
      if (document.documentElement.scrollTop) document.documentElement.scrollTop = 0;
      if (document.body.scrollTop) document.body.scrollTop = 0;
    };
    window.addEventListener('scroll', snap, { passive: true, capture: true });
    document.addEventListener('scroll', snap, { passive: true, capture: true });

    // While any input is focused, run a snap loop via rAF — iOS scrolls
    // between events, so we need to be aggressive.
    var rafId = null;
    var loop = function(){ snap(); rafId = requestAnimationFrame(loop); };
    window.addEventListener('focusin', function(e){
      var t = e.target;
      if (!t || (t.tagName !== 'INPUT' && t.tagName !== 'TEXTAREA')) return;
      snap();
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    });
    window.addEventListener('focusout', function(){
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      // One last snap on blur in case iOS scrolled during the close anim.
      setTimeout(snap, 50);
      setTimeout(snap, 250);
    });
  })();
</script>
<script src="crm-data.js?v=114"></script>
<script type="text/babel" src="crm-shared.jsx?v=114"></script>
<script type="text/babel" src="crm-left.jsx?v=114"></script>
<script type="text/babel" src="crm-right.jsx?v=114"></script>
<script type="text/babel" src="crm-permit-portals.jsx?v=114"></script>
<script type="text/babel" src="crm-todos.jsx?v=114"></script>
<script type="text/babel" src="crm-app.jsx?v=114"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  /* v10.1.18: transparent chin via fixed pseudo-element. Earlier attempt
     (v10.1.16) clipped #root height which broke iOS keyboard handling.
     This keeps #root at full viewport height (no layout regression) and
     uses a fixed::before behind the React tree to paint #f4f6f9 only
     ABOVE the home indicator. Below that, body bg is transparent so iOS
     chrome shows through. Compose bar + bottom buttons already pad with
     env(safe-area-inset-bottom) so content never lives on the chin. */
  /* height: 100dvh = dynamic viewport height — adapts to keyboard open
     on iOS 15.4+. Combined with interactive-widget=resizes-content above,
     the layout viewport shrinks WITH the keyboard so the page never has
     to scroll its document. Fallback to 100% for old browsers. */
  /* v10.1.22: chin transparency REVERTED — too many regressions for too
     little visual upside. In standalone PWA mode there's no Safari chrome
     to show through anyway; iOS just paints default white below the page.
     Painting bg #f4f6f9 edge-to-edge looks identical to the rest of the
     page and avoids the empty-space + clip-shifts problems.
     --app-height (set by JS when keyboard opens) shrinks the layout so
     the compose bar lands above the keyboard. When keyboard is closed
     the var is unset and 100dvh fills the screen normally. */
  /* v10.1.23: position:fixed on body+#root to definitively fill the entire
     viewport including the home-indicator zone. 100dvh in iOS standalone
     PWA can return shorter than the screen, leaving a visible "chin" that
     iOS paints white below the page. position:fixed doesn't suffer this. */
  /* v10.1.27 gold-standard pattern.
     - Page sizes to --vvh (visualViewport.height); when keyboard opens
       it shrinks naturally — compose bar at panel bottom stays above the
       keyboard with no gymnastics.
     - body touch-action: none stops iOS from scrolling the document.
     - Each inner scroll container re-enables touch via touch-action: pan-y
       and gets -webkit-overflow-scrolling: touch for momentum + iOS PWA.
     - overscroll-behavior: contain on those keeps rubber-band from
       chaining out and triggering iOS auto-scroll-to-input. */
  html { height: var(--vvh, 100dvh); overflow: hidden; }
  body {
    height: var(--vvh, 100dvh);
    overflow: hidden;
    touch-action: none;
    font-family: 'DM Sans', sans-serif;
    background: #f4f6f9;
  }
  #root { height: 100%; overflow: hidden; }
  /* All inline-styled scroll containers — message thread, contact list,
     forms — get the iOS-native scroll setup. */
  [style*="overflowY"], [style*="overflow-y"], [style*="overflow:auto"], [style*="overflow:scroll"] {
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
    overscroll-behavior: contain;
  }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .chip-row {
    padding-inline: 16px !important;
    scroll-padding-inline-start: 16px;
    -webkit-mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 24px), transparent 100%);
    mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 24px), transparent 100%);
  }
  .mobile-panel *::-webkit-scrollbar { display: none; }
  .mobile-panel * { scrollbar-width: none; }
  button, textarea, input { font-family: 'DM Sans', sans-serif; }
  /* Crisp icon rendering — geometricPrecision over speed (default).
     Eliminates the "lighter at intersection" artifact when stroke paths
     cross each other in icons like the calendar. */
  svg { shape-rendering: geometricPrecision; }

  /* ── Animations ─────────────────────────────────────────────────────
     Quiet motion only — never decorative. Three principles:
       1. Buttons confirm a press with a 60ms scale-down so taps feel real.
       2. Cards fade-up 200ms when they first mount so a freshly opened
          contact pane doesn't pop in.
       3. Toasts slide from the bottom — they're news, not noise.
     Honor `prefers-reduced-motion: reduce` for the user's accessibility
     settings: all transforms collapse to instant, all transitions to none.
  */
  @keyframes bpp-fade-up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bpp-slide-up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bpp-pulse-soft {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.55; }
  }
  /* Card mount — every direct child of the right pane fades up. */
  .mobile-panel > * > [data-card],
  [data-card] {
    animation: bpp-fade-up 220ms cubic-bezier(0.2, 0.8, 0.3, 1) both;
  }
  /* Press feedback on every button — NOT links (they have native feedback). */
  button:not(:disabled):active {
    transform: scale(0.97);
    transition: transform 70ms ease-out;
  }
  button { transition: background 120ms ease, color 120ms ease, border-color 120ms ease, opacity 120ms ease; }
  /* Hover on rows + buttons (desktop only — :hover is no-op on touch). */
  @media (hover: hover) {
    button:hover:not(:disabled) { filter: brightness(1.04); }
  }
  /* Toasts — when a host wraps its toast container with [data-toast-host]. */
  [data-toast-item] { animation: bpp-slide-up 200ms cubic-bezier(0.2, 0.8, 0.3, 1) both; }

  /* Soft pulse for "today" / live indicators — subtle, not nagging. */
  @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.45 } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div id="root"></div>
</body>
</html>
