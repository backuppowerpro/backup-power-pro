<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backup Power Pro — Proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<style>
:root {
  --navy:#0b1f3b; --navy2:#1a3a5c; --gold:#ffba00;
  --green:#059669; --red:#dc2626; --border:#e4e8f0;
  --bg:#eef1f7; --text:#1a2a42; --text2:#4a5568; --text3:#8a9ab5;
  --blue:#1d4ed8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100%}

/* ── HEADER ─────────────────────────────────────────── */
.site-header{background:var(--navy);padding:16px 24px;text-align:center}
.site-header .brand{font-family:'Outfit',sans-serif;font-weight:800;font-size:20px;color:#fff;letter-spacing:-.01em}
.site-header .brand span{color:var(--gold)}
.site-header .tagline{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}

/* ── PAGE ───────────────────────────────────────────── */
.page{max-width:660px;margin:0 auto;padding:24px 20px 48px}

/* ── PROPERTY PHOTO BANNER ──────────────────────────── */
.property-banner{position:relative;width:calc(100% + 56px);margin:-28px -28px 0;background:var(--navy);overflow:hidden;flex-shrink:0;border-radius:16px 16px 0 0}
.property-banner img{width:100%;height:auto;display:block}
.property-banner-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(11,31,59,.65) 0%,transparent 28%,rgba(11,31,59,.45) 55%,#0b1f3b 100%);pointer-events:none}
.property-banner-greeting{position:absolute;top:0;left:0;right:0;padding:16px 20px;pointer-events:none}
.property-banner-greeting-text{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:#fff;line-height:1.25;text-shadow:0 2px 14px rgba(0,0,0,.8)}
.property-banner-label{position:absolute;bottom:0;left:0;right:0;padding:14px 20px 18px;pointer-events:none}
.property-banner-eyebrow{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:4px}
.property-banner-addr{font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5);line-height:1.25}
.property-banner-initials{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:52px;font-weight:800;color:rgba(255,255,255,.18);letter-spacing:-3px;pointer-events:none;min-height:160px}
@media(max-width:480px){.property-banner{margin:-24px -20px 0;width:calc(100% + 40px)}.property-banner-addr{font-size:13px}}
/* ── SCOPE + PRICE PRODUCT THUMBS ──────────────────── */
.scope-thumb{width:52px;height:52px;border-radius:9px;object-fit:cover;flex-shrink:0;margin-left:auto;border:1.5px solid rgba(0,0,0,.07);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.price-item-cell{display:flex;align-items:flex-start;gap:12px}
.price-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1.5px solid rgba(0,0,0,.07);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── SCROLL REVEAL ──────────────────────────────────── */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .65s ease,transform .65s ease}
.reveal.revealed{opacity:1;transform:translateY(0)}
.reveal-fast{transition-duration:.4s}
.reveal-delay-1{transition-delay:.08s}
.reveal-delay-2{transition-delay:.16s}
.reveal-delay-3{transition-delay:.24s}
.reveal-delay-4{transition-delay:.32s}

/* ── HERO CARD ──────────────────────────────────────── */
.hero-card{background:var(--navy);border-radius:20px;padding:28px 28px 24px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero-eyebrow{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;margin-top:0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.expires-badge{font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 10px;background:rgba(255,186,0,.15);border:1px solid rgba(255,186,0,.3);border-radius:20px;color:var(--gold);white-space:nowrap}
.expires-clock{display:inline-block;animation:alarmRing 2.8s ease-in-out infinite}
@keyframes alarmRing{
  0%,40%,100%{transform:translateY(0) rotate(0deg)}
  42%{transform:translateY(-4px) rotate(-18deg)}
  45%{transform:translateY(-6px) rotate(16deg)}
  48%{transform:translateY(-5px) rotate(-14deg)}
  51%{transform:translateY(-5px) rotate(12deg)}
  54%{transform:translateY(-4px) rotate(-10deg)}
  57%{transform:translateY(-3px) rotate(7deg)}
  60%{transform:translateY(-1px) rotate(-4deg)}
  63%{transform:translateY(0) rotate(0deg)}
}
.hero-title{font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;line-height:1.1;margin-bottom:6px}
.hero-sub{font-size:14px;color:rgba(255,255,255,.72);line-height:1.5}
.hero-meta{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px}
.hero-meta-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:3px;font-family:'Outfit',sans-serif}
.hero-meta-value{font-size:13px;font-weight:600;color:#fff;word-break:break-word}

/* ── PERSONAL NOTE ──────────────────────────────────── */
.personal-note{background:#fff;border-radius:14px;padding:18px 20px;margin-bottom:16px;display:flex;gap:14px;align-items:flex-start;box-shadow:0 2px 16px rgba(11,31,59,.07),0 1px 4px rgba(11,31,59,.04)}
.personal-note-avatar{width:40px;height:40px;border-radius:50%;background:var(--navy);color:var(--gold);font-family:'Outfit',sans-serif;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.personal-note-from{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px}
.personal-note-text{font-size:13px;color:var(--text2);line-height:1.65}

/* ── REALITY BLOCK (problem + outcome combined) ─────── */
.reality-block{background:var(--navy);border-radius:16px;overflow:hidden;margin-bottom:16px;color:#fff}
.section-eyebrow{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.problem-headline{font-family:'Outfit',sans-serif;font-size:22px;font-weight:900;line-height:1.2;color:#fff;margin-bottom:18px}
.reality-top{padding:24px 22px 20px}
.reality-stats{display:flex;align-items:stretch;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;margin-bottom:18px}
.reality-stat{flex:1;padding:14px 12px;display:flex;align-items:center;gap:10px}
.reality-stat-divider{width:1px;background:rgba(255,255,255,.1);flex-shrink:0}
.reality-num{font-family:'Outfit',sans-serif;font-size:38px;font-weight:900;color:var(--gold);line-height:1;flex-shrink:0}
.reality-stat-info{display:flex;flex-direction:column;gap:3px}
.reality-stat-unit{font-size:11px;font-weight:700;color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:.04em}
.reality-stat-sub{font-size:11px;color:rgba(255,255,255,.45);line-height:1.4}
.loss-list{display:flex;flex-direction:column;gap:7px}
.loss-item{display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(255,255,255,.85);background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.25);border-radius:8px;padding:12px 14px;font-weight:500}
.loss-emoji{display:inline-block;font-size:18px;flex-shrink:0}
.loss-emoji--meat{animation:emojiMeat 3.8s ease-in-out infinite}
.loss-emoji--pill{animation:emojiPill 2.8s ease-in-out infinite}
.loss-emoji--warn{animation:emojiWarn 2.4s ease-in-out infinite}
@keyframes emojiMeat{0%,55%,100%{transform:translateY(0) rotate(0deg)}10%{transform:translateY(-9px) rotate(-20deg)}20%{transform:translateY(2px) rotate(10deg)}30%{transform:translateY(-5px) rotate(-7deg)}40%{transform:translateY(1px) rotate(4deg)}50%{transform:translateY(0) rotate(0deg)}}
@keyframes emojiPill{0%,55%,100%{transform:rotate(0deg)}10%{transform:rotate(-30deg)}20%{transform:rotate(22deg)}30%{transform:rotate(-14deg)}40%{transform:rotate(8deg)}50%{transform:rotate(0deg)}}
@keyframes emojiWarn{0%,45%,100%{transform:scale(1);opacity:1}12%{transform:scale(1.35);opacity:.5}24%{transform:scale(1);opacity:1}36%{transform:scale(1.18);opacity:.7}}
.reality-bottom{padding:16px 22px 22px;background:rgba(255,255,255,.03);border-top:1px solid rgba(255,186,0,.15)}
.outcome-headline-inner{font-family:'Outfit',sans-serif;font-size:18px;font-weight:900;color:#fff;margin-bottom:10px;line-height:1.25}
.outcome-scenario-inner{font-size:13px;color:rgba(255,255,255,.68);line-height:1.8}

/* ── CARD ───────────────────────────────────────────── */
.card{background:#fff;border-radius:14px;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 16px rgba(11,31,59,.07),0 1px 4px rgba(11,31,59,.04)}
.card-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-icon{width:32px;height:32px;border-radius:8px;background:#eff6ff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-head h2{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:var(--navy)}
.card-body{padding:18px 20px}

/* ── SCOPE LIST ─────────────────────────────────────── */
.scope-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.scope-item{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--text);opacity:0;transform:translateX(-10px);transition:opacity .4s ease,transform .4s ease;padding:3px 0}
.scope-item.scope-in{opacity:1;transform:translateX(0)}
.scope-check{width:22px;height:22px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.scope-check svg{width:10px;height:10px}
.scope-item-text strong{display:block;font-weight:600}
.scope-item-text span{font-size:12px;color:var(--text3)}

/* ── INSTALL PHOTOS ─────────────────────────────────── */
.photos-section{margin-bottom:16px}
.photos-label{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);text-align:center;margin-bottom:10px}
.photos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.photos-grid img{width:100%;height:90px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border);transition:transform .2s ease}
.photos-grid img:hover{transform:scale(1.04)}

/* ── PROOF + ANCHOR BLOCK ───────────────────────────── */
.proof-anchor-block{background:#fff;border:none;border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 2px 16px rgba(11,31,59,.07),0 1px 4px rgba(11,31,59,.04)}
.proof-anchor-top{padding:22px 20px 18px}
.anchor-headline{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;text-align:center;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.anchor-vs-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
.anchor-col{flex:1;text-align:center}
.anchor-col-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.anchor-price-old{font-family:'Outfit',sans-serif;font-size:30px;font-weight:900;color:#94a3b8;position:relative;display:inline-block}
.anchor-price-old::after{content:'';position:absolute;left:0;top:50%;height:3px;background:var(--red);transform:translateY(-50%);width:0;transition:width .9s cubic-bezier(.4,0,.2,1);border-radius:2px}
.anchor-price-old.struck::after{width:100%}
.anchor-vs-badge{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:800;color:var(--text3);flex-shrink:0}
.anchor-price-new{font-family:'Outfit',sans-serif;font-size:32px;font-weight:900;color:var(--green)}
.anchor-tagline{text-align:center;font-size:13px;color:var(--text2);line-height:1.5}
.anchor-tagline strong{color:var(--navy)}
.proof-divider{display:flex;align-items:center;gap:10px;padding:0 20px;margin:2px 0}
.proof-divider-line{flex:1;height:1px;background:var(--border)}
.proof-divider-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);white-space:nowrap;font-family:'Outfit',sans-serif}
.proof-anchor-bottom{background:var(--bg);border-top:1px solid var(--border);padding:18px 20px}
.review-card-inner{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.review-stars{font-size:13px;color:var(--gold);margin-bottom:6px;letter-spacing:1px}
.review-text{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px}
.review-author{font-size:11px;font-weight:700;color:var(--text3)}
.proof-rating-row{display:flex;align-items:center;justify-content:center;gap:8px}

/* ── AMP TOGGLE ─────────────────────────────────────── */
.amp-toggle-wrap{margin-bottom:16px}
.amp-toggle-label{font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;text-align:center}
.amp-toggle{display:flex;background:#f1f5f9;border-radius:12px;padding:4px;gap:4px}
.amp-toggle-btn{flex:1;padding:12px 0;border-radius:10px;border:none;background:transparent;color:var(--text2);font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.amp-toggle-btn.active{background:var(--navy);color:#fff;box-shadow:0 2px 10px rgba(11,31,59,.25)}
.amp-toggle-btn:not(.active):hover{background:#e2e8f0}
.amp-toggle-btn .amp-sub{font-size:10px;font-weight:500;opacity:.7;display:block;margin-top:2px}

/* ── PRICING TABLE ──────────────────────────────────── */
.price-table{width:100%;border-collapse:collapse;font-size:14px}
.price-table td{padding:16px 0;border-bottom:1px solid var(--border);vertical-align:top}
.price-table tr:last-child td{border-bottom:none}
.price-table td:last-child{text-align:right;font-weight:700;color:var(--navy);white-space:nowrap;padding-left:12px}
.price-item-name{font-weight:700;color:var(--navy);font-size:14px}
.price-item-desc{font-size:12px;color:var(--text3);margin-top:2px;margin-bottom:8px}
.price-item-bullets{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.price-item-bullet{font-size:12px;color:var(--text2);display:flex;align-items:baseline;gap:6px;line-height:1.4}
.price-item-bullet::before{content:'✓';color:var(--green);font-weight:900;font-size:11px;flex-shrink:0}
.price-total-row td{padding-top:14px;font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;color:var(--navy)}
.total-badge{background:var(--navy);color:var(--gold);font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;padding:5px 14px;border-radius:8px;display:inline-block;transition:all .3s}
.per-day-note{text-align:center;padding:10px 0 2px;font-size:13px;color:var(--text3);line-height:1.5}

/* ── POM CARD ───────────────────────────────────────── */
/* ── UNIFIED INVESTMENT BLOCK ───────────────────────── */
.investment-block{background:#fff;border:2px solid var(--gold);border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 32px rgba(255,186,0,.12),0 2px 8px rgba(0,0,0,.05)}
.investment-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.investment-head h2{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:var(--navy)}
.investment-head-icon{width:32px;height:32px;border-radius:8px;background:#fffbeb;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.investment-items{padding:4px 20px 0}
.pom-divider-bar{background:var(--gold);padding:7px 20px;display:flex;align-items:center;justify-content:space-between;font-family:'Outfit',sans-serif;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#7a4a00}
.pom-section{background:linear-gradient(135deg,#0b1f3b 0%,#1a3a5c 100%);padding:18px 20px;cursor:pointer;transition:background .2s}
.pom-section:hover{background:linear-gradient(135deg,#0f2a50 0%,#1e4570 100%)}
.pom-top-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pom-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:900;color:#fff;flex:1}
.pom-price-label{font-family:'Outfit',sans-serif;font-size:20px;font-weight:900;color:var(--gold);text-align:right;flex-shrink:0}
.pom-price-sub{font-size:10px;color:rgba(255,255,255,.4);font-weight:600;text-align:right}
.pom-features-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pom-feature-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 11px;display:flex;align-items:flex-start;gap:8px}
.pom-feature-pill-title{font-size:12px;font-weight:700;color:#fff;line-height:1.3}
.pom-feature-pill-desc{font-size:11px;color:rgba(255,255,255,.5);line-height:1.4;margin-top:2px}
.investment-total-section{padding:14px 20px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.investment-total-label{font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;color:var(--navy)}
.investment-per-day{text-align:center;padding:0 20px 14px;font-size:13px;color:var(--text3)}
@media(max-width:480px){.pom-features-grid{grid-template-columns:1fr}}
.pom-body{padding:16px 18px 18px;position:relative}
.pom-body::before{content:'';position:absolute;top:0;right:0;width:140px;height:140px;background:radial-gradient(circle,rgba(255,186,0,.08),transparent 70%)}
.surge-toggle-track{width:52px;height:32px;border-radius:16px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.2);cursor:pointer;position:relative;transition:all .25s;flex-shrink:0}
.surge-toggle-track.on{background:var(--gold);border-color:var(--gold)}
.surge-toggle-knob{width:24px;height:24px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.surge-toggle-track.on .surge-toggle-knob{transform:translateX(20px)}
.pom-feature{display:flex;align-items:flex-start;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px}
.pom-feature-title{font-size:12px;font-weight:700;color:#fff;margin-bottom:2px}
.pom-feature-desc{font-size:11px;color:rgba(255,255,255,.55);line-height:1.4}

/* ── GUARANTEE SECTION ──────────────────────────────── */
.guarantee-section{background:#fff;border-radius:16px;padding:24px 20px;margin-bottom:16px;box-shadow:0 2px 16px rgba(11,31,59,.07),0 1px 4px rgba(11,31,59,.04)}
.guarantee-item{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;background:#f8fffe;border:1.5px solid #c6f6ef;border-radius:10px;margin-bottom:10px}
.guarantee-item:last-child{margin-bottom:0}
.guarantee-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.guarantee-item-title{font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;color:var(--navy);margin-bottom:2px}
.guarantee-item-desc{font-size:12px;color:var(--text2);line-height:1.45}

/* ── AUTHORITY BADGES ───────────────────────────────── */
.badge-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:18px}
.authority-badge{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--navy);color:#fff;border-radius:20px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;opacity:.9}

/* ── SCARCITY BAR ───────────────────────────────────── */
.scarcity-bar{background:linear-gradient(135deg,#7f1d1d,#991b1b);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:16px}
.scarcity-dots{display:flex;gap:5px;flex-shrink:0}
.scarcity-dot{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s}
.scarcity-dot.filled{background:var(--gold)}

// ── SCROLL REVEAL ────────────────────────────────────────────
function initScrollReveal() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      entry.target.classList.add('revealed');
      // Trigger stat counters
      if (entry.target.classList.contains('reality-stats')) animateStats(entry.target);
      // Trigger price anchor strike-through
      if (entry.target.id === 'anchor-section') {
        setTimeout(() => { document.querySelector('.anchor-price-old')?.classList.add('struck'); }, 500);
      }
      // Stagger scope checklist items
      if (entry.target.classList.contains('scope-list')) {
        entry.target.querySelectorAll('.scope-item').forEach((el, i) => {
          setTimeout(() => el.classList.add('scope-in'), i * 80);
        });
      }
      // Stagger loss list items
      if (entry.target.classList.contains('loss-list')) {
        entry.target.querySelectorAll('.loss-item').forEach((el, i) => {
          el.style.opacity = '0';
          el.style.transform = 'translateX(-16px)';
          setTimeout(() => {
            el.style.transition = 'opacity .4s ease, transform .4s ease';
            el.style.opacity = '1';
            el.style.transform = 'translateX(0)';
          }, i * 100);
        });
      }
      // Stagger guarantee items
      if (entry.target.classList.contains('guarantee-section')) {
        entry.target.querySelectorAll('.guarantee-item').forEach((el, i) => {
          el.style.opacity = '0';
          el.style.transform = 'translateX(-14px)';
          setTimeout(() => {
            el.style.transition = 'opacity .45s ease, transform .45s ease';
            el.style.opacity = '1';
            el.style.transform = 'translateX(0)';
          }, 150 + i * 120);
        });
      }
      obs.unobserve(entry.target);
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

function animateStats(container) {
  container.querySelectorAll('.reality-num').forEach((el, idx) => {
    const target = parseFloat(el.dataset.target);
    const decimals = String(target).includes('.') ? 1 : 0;
    const duration = 1400;
    const startDelay = idx * 120;
    setTimeout(() => {
      const start = Date.now();
      function tick() {
        const elapsed = Date.now() - start;
        const t = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        el.textContent = (target * eased).toFixed(decimals);
        if (t < 1) { requestAnimationFrame(tick); }
        else { el.style.animation = 'statPop .35s ease-out forwards'; }
      }
      requestAnimationFrame(tick);
    }, startDelay);
  });
}

// ── CONFETTI ─────────────────────────────────────────────────
function launchConfetti() {
  // Screen flash
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:rgba(255,186,0,.35);z-index:9998;pointer-events:none;animation:flashBurst .7s ease-out forwards';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 800);

  const colors = ['#ffba00','#0b1f3b','#059669','#fff','#dc2626','#1d4ed8','#f97316','#a855f7','#ec4899'];
  const emojis = ['⚡','🎉','✅','🏠','💪','🔒','🎊'];

  function burst(count, opts = {}) {
    const c = document.createElement('div');
    c.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
    document.body.appendChild(c);
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      const isEmoji = Math.random() > 0.82;
      const isStrip = !isEmoji && Math.random() > 0.65;
      const isCircle = !isEmoji && !isStrip && Math.random() > 0.4;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const x = opts.spread ? (Math.random() * 140 - 20) : (Math.random() * 100);
      const delay = Math.random() * (opts.maxDelay || 0.7);
      const dur = 2.8 + Math.random() * 2.2;
      const sway = Math.random() > 0.5 ? `confettiSway ${1.2 + Math.random()}s ease-in-out infinite` : '';
      if (isEmoji) {
        p.style.cssText = `position:absolute;left:${x}%;top:-20px;font-size:${16 + Math.random()*10}px;animation:confettiFall ${dur}s ease-in ${delay}s forwards${sway ? ','+sway : ''}`;
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      } else {
        const w = isStrip ? `${3+Math.random()*3}px` : `${6+Math.random()*10}px`;
        const h = isStrip ? `${14+Math.random()*8}px` : w;
        p.style.cssText = `position:absolute;left:${x}%;top:-14px;width:${w};height:${h};background:${color};border-radius:${isCircle?'50%':'2px'};animation:confettiFall ${dur}s ease-in ${delay}s forwards${sway?','+sway:''}`;
      }
      c.appendChild(p);
    }
    setTimeout(() => c.remove(), 6500);
  }

  burst(140, { spread: true, maxDelay: 0.4 });
  setTimeout(() => burst(100, { maxDelay: 0.5 }), 350);
  setTimeout(() => burst(80, { spread: true, maxDelay: 0.6 }), 750);
  setTimeout(() => burst(60, { maxDelay: 0.4 }), 1200);

  // Celebration modal
  setTimeout(() => showCelebrationModal(), 500);
}

  requestAnimationFrame(() => { backdrop.style.background = 'rgba(11,31,59,.72)'; });

  // Card (no button)

  modal.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10000;padding:20px;pointer-events:none';
  modal.innerHTML = `

// ── ACK ROW WIRING ───────────────────────────────────────────
function wireAckRow(rowId, boxId, key) {
  const row = document.getElementById(rowId);
  row.addEventListener('click', function(e) {
    if (e.target.tagName === 'A') return;
    if (key === 'scope') ackScope = !ackScope;
    else ackSafety = !ackSafety;
    updateAckVisual(rowId, boxId, key === 'scope' ? ackScope : ackSafety);
    validateForm();
  });
}

function updateAckVisual(rowId, boxId, checked) {
  const row = document.getElementById(rowId);
  const box = document.getElementById(boxId);
  const svg = box.querySelector('svg');
  if (checked) { row.classList.add('checked'); svg.style.display = ''; }
  else { row.classList.remove('checked'); svg.style.display = 'none'; }
}

    <div style="border-top:2px solid #e4e8f0;margin:12px 0"></div>
    <div style="font-size:14px;font-weight:800;color:#0b1f3b;margin-bottom:10px">Pricing</div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px">${pricingRows}<tr style="border-top:2px solid #0b1f3b"><td style="padding:10px 0;font-weight:800;font-size:16px;color:#0b1f3b">Total</td><td style="padding:10px 0;font-weight:800;font-size:16px;color:#0b1f3b;text-align:right">${fmt(total)}</td></tr></table>
    ${P.notes ? '<div style="border-top:2px solid #e4e8f0;margin:12px 0"></div><div style="font-size:12px;font-weight:700;color:#0b1f3b;margin-bottom:6px">Notes from Key</div><div style="font-size:11px;color:#4a5568;line-height:1.6">' + esc(P.notes) + '</div>' : ''}
    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 14px;margin-top:16px;font-size:11px;color:#92400e;line-height:1.6"><strong>Payment Terms:</strong> Full payment is due upon completion of installation.</div>
    <div style="text-align:center;font-size:10px;color:#8a9ab5;border-top:1px solid #e4e8f0;padding-top:12px;margin-top:16px">Backup Power Pro · SC LIC #2942 · (864) 400-5302 · backuppowerpro.com</div>
  </div>`;

  const el = document.createElement('div');
  el.style.cssText = 'width:680px;';
  el.innerHTML = pageHtml;
  document.body.appendChild(el);
  try {
    const canvas = await html2canvas(el, { scale: 2, useCORS: true, logging: false, backgroundColor: '#ffffff' });
    const pdf = new jspdf.jsPDF({ unit: 'mm', format: 'letter', orientation: 'portrait' });
    const pageW = 215.9, marginX = 12, marginY = 10, contentW = pageW - (marginX * 2);
    const img = canvas.toDataURL('image/jpeg', 0.98);
    const h = (canvas.height * contentW) / canvas.width;
    pdf.addImage(img, 'JPEG', marginX, marginY, contentW, h);
    pdf.save('BPP-Proposal-' + (P.contact_name || 'Customer').replace(/[^a-zA-Z0-9]/g, '-') + '.pdf');
  } catch(e) { console.error('PDF generation failed:', e); }
  if (el.parentNode) document.body.removeChild(el);
  downloading = false;
  if (dlBtn) { dlBtn.disabled = false; dlBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Proposal PDF'; }
}

// ── ERROR ─────────────────────────────────────────────────────
function showError(title, msg) {
  document.getElementById('main').innerHTML = `<div class="state-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><h2>${title}</h2><p>${msg}</p></div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

</script>
