<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backup Power Pro — Proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
<style>
:root {
  --navy:#0b1f3b; --navy2:#1a3a5c; --gold:#ffba00;
  --green:#059669; --red:#dc2626; --border:#e4e8f0;
  --bg:#f4f6fa; --text:#1a2a42; --text2:#4a5568; --text3:#8a9ab5;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100%}

/* HEADER */
.site-header{background:var(--navy);padding:18px 24px;text-align:center}
.site-header .brand{font-family:'Outfit',sans-serif;font-weight:800;font-size:20px;color:#fff;letter-spacing:-.01em}
.site-header .brand span{color:var(--gold)}
.site-header .tagline{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}

/* PAGE */
.page{max-width:680px;margin:0 auto;padding:28px 20px 60px}

/* HERO */
.hero-card{background:var(--navy);border-radius:16px;padding:28px 28px 24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;background:var(--gold);opacity:.06;border-radius:50%}
.hero-eyebrow{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.hero-title{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;line-height:1.15;margin-bottom:6px}
.hero-sub{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:20px}
.hero-meta{display:flex;gap:20px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.12);padding-top:16px}
.hero-meta-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:3px;font-family:'Outfit',sans-serif}
.hero-meta-value{font-size:13px;font-weight:600;color:#fff;word-break:break-word}

/* CARD */
.card{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:16px;overflow:hidden}
.card-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-icon{width:32px;height:32px;border-radius:8px;background:#eff6ff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-head h2{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:var(--navy)}
.card-body{padding:18px 20px}

/* SCOPE LIST */
.scope-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.scope-item{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--text)}
.scope-check{width:20px;height:20px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.scope-check svg{width:10px;height:10px}
.scope-item-text strong{display:block;font-weight:600}
.scope-item-text span{font-size:12px;color:var(--text3)}

/* AMP TOGGLE */
.amp-toggle-wrap{margin-bottom:20px}
.amp-toggle-label{font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;text-align:center}
.amp-toggle{display:flex;background:#f1f5f9;border-radius:12px;padding:4px;gap:4px}
.amp-toggle-btn{flex:1;padding:12px 0;border-radius:10px;border:none;background:transparent;color:var(--text2);font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.amp-toggle-btn.active{background:var(--navy);color:#fff;box-shadow:0 2px 10px rgba(11,31,59,.25)}
.amp-toggle-btn:not(.active):hover{background:#e2e8f0}
.amp-toggle-btn .amp-sub{font-size:10px;font-weight:500;opacity:.7;display:block;margin-top:2px}

/* PRICING TABLE */
.price-table{width:100%;border-collapse:collapse;font-size:14px}
.price-table td{padding:11px 0;border-bottom:1px solid var(--border);vertical-align:top}
.price-table tr:last-child td{border-bottom:none}
.price-table td:last-child{text-align:right;font-weight:600;color:var(--text);white-space:nowrap}
.price-item-name{font-weight:500;color:var(--text)}
.price-item-desc{font-size:12px;color:var(--text3);margin-top:2px}
.price-total-row td{padding-top:14px;font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;color:var(--navy)}
.total-badge{background:var(--navy);color:var(--gold);font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;padding:5px 14px;border-radius:8px;display:inline-block;transition:all .3s}
.compare-box{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:14px 16px;margin-top:16px;font-size:13px;color:var(--green);font-weight:600;text-align:center;line-height:1.5}
.compare-box span{font-size:11px;font-weight:400;color:#065f46}

/* SURGE UPSELL */
.surge-card{background:linear-gradient(135deg,#0b1f3b 0%,#1a3a5c 100%);border-radius:14px;margin-bottom:16px;overflow:hidden;position:relative}
.surge-card::before{content:'';position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle,rgba(255,186,0,.08) 0%,transparent 70%)}
.surge-head{padding:20px 20px 0;position:relative}
.surge-eyebrow{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.surge-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:#fff;line-height:1.25;margin-bottom:6px}
.surge-sub{font-size:13px;color:rgba(255,255,255,.6);line-height:1.5}
.surge-risk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:16px 20px}
.surge-risk-item{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 10px;text-align:center}
.surge-risk-icon{font-size:20px;margin-bottom:4px}
.surge-risk-name{font-size:11px;color:rgba(255,255,255,.7);font-weight:500;margin-bottom:4px}
.surge-risk-cost{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:#fff}
.surge-risk-label{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.surge-action{padding:0 20px 20px;display:flex;align-items:center;gap:12px;cursor:pointer}
.surge-toggle-track{width:52px;height:32px;border-radius:16px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.2);cursor:pointer;position:relative;transition:all .25s;flex-shrink:0}
.surge-toggle-track.on{background:var(--gold);border-color:var(--gold)}
.surge-toggle-knob{width:24px;height:24px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.surge-toggle-track.on .surge-toggle-knob{transform:translateX(24px)}
.surge-toggle-text{flex:1}
.surge-toggle-label{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:#fff}
.surge-toggle-price{font-size:12px;color:rgba(255,255,255,.5);margin-top:1px}
.surge-toggle-price.on{color:var(--gold)}
.surge-stat{font-size:11px;color:rgba(255,255,255,.4);text-align:center;padding:0 20px 16px;line-height:1.4}
.surge-stat strong{color:rgba(255,255,255,.7)}

/* SIGN SECTION */
.sign-card{background:#fff;border:2px solid var(--navy);border-radius:14px;overflow:hidden;margin-bottom:16px}
.sign-card-head{background:var(--navy);padding:16px 20px}
.sign-card-head h2{font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;color:#fff}
.sign-card-head p{font-size:13px;color:rgba(255,255,255,.6);margin-top:3px}
.sign-card-body{padding:20px}
.ack-row{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:#f8f9fb;border:1.5px solid var(--border);border-radius:10px;margin-bottom:16px;cursor:pointer;transition:border-color .15s;user-select:none;-webkit-user-select:none;min-height:48px}
.ack-row:hover{border-color:var(--navy2)}
.ack-row.checked{border-color:var(--green);background:#f0fdf4}
.ack-box{width:28px;height:28px;border-radius:7px;border:2px solid #cbd5e1;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:0;transition:all .15s}
.ack-row.checked .ack-box{background:var(--green);border-color:var(--green)}
.ack-text{font-size:14px;color:var(--text);line-height:1.5}
.ack-text a{color:var(--navy);font-weight:600;text-decoration:underline;padding:4px 2px;display:inline-block}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:7px;letter-spacing:.03em;display:block}
.form-label .req{color:var(--red)}
.name-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:border .15s}
.name-input:focus{border-color:var(--navy)}
.sig-preview{font-family:'Dancing Script',cursive;font-size:28px;color:var(--navy);text-align:center;padding:12px 0 4px;min-height:48px;opacity:.7;transition:opacity .2s}
.sig-preview:empty{opacity:0}
.name-hint{font-size:12px;color:var(--text3);margin-top:6px}
.approve-btn{width:100%;padding:16px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;cursor:pointer;margin-top:20px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:10px}
.approve-btn:hover{background:var(--navy2)}
.approve-btn:disabled{opacity:.4;cursor:not-allowed;background:#94a3b8}

/* APPROVED */
.approved-banner{background:var(--green);border-radius:14px;padding:32px 24px;text-align:center;color:#fff;margin-bottom:16px}
.approved-icon{width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.approved-banner h2{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;margin-bottom:6px}
.approved-banner p{font-size:14px;opacity:.85}
.approved-receipt{background:#f8fafc;border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:16px}
.approved-receipt-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px}
.approved-receipt-row:not(:last-child){border-bottom:1px solid var(--border)}
.approved-receipt-label{color:var(--text3)}
.approved-receipt-value{font-weight:600;color:var(--text)}

/* NEXT STEPS */
.next-step-item{display:flex;gap:14px;align-items:flex-start;padding:14px 0}
.next-step-item:not(:last-child){border-bottom:1px solid var(--border)}
.next-step-num{width:28px;height:28px;border-radius:50%;background:var(--navy);color:var(--gold);font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.next-step-text strong{display:block;font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.next-step-text span{font-size:12px;color:var(--text3);line-height:1.4}

/* DOWNLOAD BTN */
.dl-btn{width:100%;padding:14px;background:#fff;color:var(--navy);border:2px solid var(--navy);border-radius:10px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.dl-btn:hover{background:var(--navy);color:#fff}
.dl-btn:disabled{opacity:.6;pointer-events:none}

/* LOADING / ERROR */
.state-wrap{text-align:center;padding:60px 24px}
.state-wrap svg{width:48px;height:48px;opacity:.25;margin-bottom:14px}
.state-wrap h2{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--navy);margin-bottom:8px}
.state-wrap p{font-size:14px;color:var(--text3)}
.spinner-large{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.site-footer{text-align:center;padding:24px;font-size:12px;color:var(--text3);border-top:1px solid var(--border);margin-top:20px}
.site-footer a{color:var(--text3);text-decoration:none}
.site-footer a:hover{color:var(--navy)}

@media(max-width:480px){
  .hero-title{font-size:22px}
  .hero-card{padding:24px 20px 20px}
  .hero-meta{gap:14px}
  .page{padding:16px 14px 48px}
  .surge-risk-grid{grid-template-columns:1fr 1fr 1fr;gap:6px}
  .surge-risk-item{padding:10px 6px}
  .surge-risk-cost{font-size:14px}
  .sig-preview{padding:16px 0 12px;min-height:56px}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="brand">Backup Power <span>Pro</span></div>
  <div class="tagline">Licensed Electrical Contractor · Upstate SC</div>
</header>

<main class="page" id="main">
  <div class="state-wrap">
    <div class="spinner-large"></div>
    <p>Loading your proposal...</p>
  </div>
</main>

<footer class="site-footer">
  <a href="https://backuppowerpro.com">backuppowerpro.com</a> &nbsp;·&nbsp; (864) 400-5302
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = 'https://reowtzedjflwmlptupbk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4tYd9eFAYCTjnoKl1hbBBg_yyO9-vMB';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let P = null;           // proposal data
let chosenAmp = null;    // '30' or '50'
let surgeOn = false;
let ackScope = false;
let ackSafety = false;

// ── INIT ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) { showError('No proposal found.', 'This link is missing a proposal token.'); return; }

  const { data, error } = await db.from('proposals').select('*').eq('token', token).single();
  if (error || !data) { showError('Proposal not found.', 'This link may be invalid or has been removed.'); return; }

  P = data;

  // Track view (fire & forget)
  trackView(token);

  if (P.status === 'Approved') {
    renderApproved();
  } else {
    renderProposal();
  }
});

// ── VIEW TRACKING ───────────────────────────────────────────
async function trackView(token) {
  try {
    await db.from('proposals').update({
      viewed_at: new Date().toISOString(),
      view_count: (P.view_count || 0) + 1,
      status: P.status === 'Draft' ? 'Viewed' : P.status,
    }).eq('token', token);
  } catch(e) {}
}

// ── GET IP ──────────────────────────────────────────────────
async function getIP() {
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const d = await r.json();
    return d.ip;
  } catch(e) { return 'unknown'; }
}

// ── PRICING HELPERS ─────────────────────────────────────────
function getPrice(amp) {
  if (amp === '50' && P.pricing_50) return P.pricing_50;
  if (amp === '30' && P.pricing_30) return P.pricing_30;
  return {
    base: P.price_base || 0,
    cord: P.include_cord ? (P.price_cord || 150) : 0,
    cordIncluded: P.include_cord,
    mainBreaker: 0, twinQuad: 0, longRun: 0,
    permitInspection: 0,
    total: P.total || 0,
  };
}

function calcTotal(amp) {
  const pr = getPrice(amp);
  const base = pr.total || pr.base || 0;
  // Don't add surge if old-format proposal already includes it in total
  const surgeAdder = (surgeOn && !P.include_surge) ? (P.surge_price || 375) : 0;
  return base + surgeAdder;
}

function fmt(n) { return '$' + Number(n).toLocaleString('en-US'); }

// ── RENDER PROPOSAL ─────────────────────────────────────────
function renderProposal() {
  const isNew = !!P.pricing_30 || !!P.pricing_50;
  const isBoth = P.amp_type === 'both';
  chosenAmp = P.selected_amp || P.amp_type || '30';
  if (chosenAmp === 'both') chosenAmp = '30';
  surgeOn = P.selected_surge || false;

  const createdDate = new Date(P.created_at).toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });

  const includes = [
    { name: 'Generator inlet box', desc: 'Installed on exterior of home, weather-rated' },
    { name: 'Interlock kit', desc: 'Code-compliant, UL-listed — prevents back-feed' },
    { name: 'Permit pulled & filed', desc: 'We handle all paperwork with the county' },
    { name: 'State electrical inspection', desc: 'Scheduled and coordinated for you' },
    { name: 'Site cleanup', desc: 'We leave it the way we found it' },
    { name: 'Customer walkthrough', desc: 'Step-by-step how to use your new system' },
  ];
  const pr = getPrice(chosenAmp);
  if (pr.cordIncluded !== false && (P.cord_included !== false)) {
    includes.push({ name: 'Power transfer cord', desc: 'Connects your generator to the inlet box' });
  }

  const notesHtml = P.notes ? `
    <div class="card">
      <div class="card-head">
        <div class="card-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <h2>Notes from Key</h2>
      </div>
      <div class="card-body" style="font-size:14px;color:var(--text2);line-height:1.6">${esc(P.notes)}</div>
    </div>` : '';

  document.getElementById('main').innerHTML = `
    <!-- Hero -->
    <div class="hero-card">
      <div class="hero-eyebrow">Your Custom Proposal</div>
      <div class="hero-title">The Storm-Ready<br>Connection System</div>
      <div class="hero-sub">One cord. Full power. Done in a day.</div>
      <div class="hero-meta">
        <div class="hero-meta-item">
          <div class="hero-meta-label">Prepared For</div>
          <div class="hero-meta-value">${esc(P.contact_name)}</div>
        </div>
        ${P.contact_address ? `<div class="hero-meta-item">
          <div class="hero-meta-label">Address</div>
          <div class="hero-meta-value">${esc(P.contact_address)}</div>
        </div>` : ''}
        <div class="hero-meta-item">
          <div class="hero-meta-label">Date</div>
          <div class="hero-meta-value">${createdDate}</div>
        </div>
      </div>
    </div>

    <!-- What's Included -->
    <div class="card">
      <div class="card-head">
        <div class="card-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <h2>Everything Included</h2>
      </div>
      <div class="card-body">
        <ul class="scope-list">
          ${includes.map(i => `<li class="scope-item"><div class="scope-check"><svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg></div><div class="scope-item-text"><strong>${esc(i.name)}</strong><span>${esc(i.desc)}</span></div></li>`).join('')}
        </ul>
      </div>
    </div>

    ${isBoth ? `
    <!-- Amp Toggle -->
    <div class="amp-toggle-wrap">
      <div class="amp-toggle-label">Choose Your Setup</div>
      <div class="amp-toggle">
        <button class="amp-toggle-btn ${chosenAmp==='30'?'active':''}" onclick="switchAmp('30')">
          30 Amp<span class="amp-sub">Standard</span>
        </button>
        <button class="amp-toggle-btn ${chosenAmp==='50'?'active':''}" onclick="switchAmp('50')">
          50 Amp<span class="amp-sub">More circuits</span>
        </button>
      </div>
    </div>` : ''}

    <!-- Pricing -->
    <div class="card" id="pricing-card">
      <div class="card-head">
        <div class="card-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <h2>Your Investment</h2>
      </div>
      <div class="card-body" id="pricing-body"></div>
    </div>

    ${notesHtml}

    <!-- Surge Protection Upsell -->
    <div class="surge-card" id="surge-card">
      <div class="surge-head">
        <div class="surge-eyebrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          One More Thing to Consider
        </div>
        <div class="surge-title">Protect What Powers Your Life</div>
        <div class="surge-sub">When the grid comes back after an outage, the voltage spike can damage everything plugged in. One device at your panel stops the surge before it reaches a single outlet.</div>
      </div>
      <div class="surge-risk-grid">

// ── ACK ROW WIRING (clean click handling) ───────────────────
function wireAckRow(rowId, boxId, key) {
  const row = document.getElementById(rowId);
  row.addEventListener('click', function(e) {
    // Don't toggle if clicking a link
    if (e.target.tagName === 'A') return;
    if (key === 'scope') ackScope = !ackScope;
    else ackSafety = !ackSafety;
    updateAckVisual(rowId, boxId, key === 'scope' ? ackScope : ackSafety);
    validateForm();
  });
}

function updateAckVisual(rowId, boxId, checked) {
  const row = document.getElementById(rowId);
  const box = document.getElementById(boxId);
  const svg = box.querySelector('svg');
  if (checked) {
    row.classList.add('checked');
    svg.style.display = '';
  } else {
    row.classList.remove('checked');
    svg.style.display = 'none';
  }
}

// ── RENDER PRICING ROWS ─────────────────────────────────────
function renderPricing() {
  const pr = getPrice(chosenAmp);
  const isNew = !!P.pricing_30 || !!P.pricing_50;
  const surgePrice = P.surge_price || 375;
  let rows = '';

  if (isNew) {
    const base = pr.base || 0;
    const longRun = pr.longRun || 0;
    const mb = pr.mainBreaker || 0;
    const tq = pr.twinQuad || 0;
    const cord = pr.cord || 0;
    const permit = pr.permitInspection || 125;

    rows += priceRow('Installation', 'Inlet box, interlock kit, panel work, walkthrough', fmt(Math.max(0, base - longRun - mb - tq - cord - permit)));
    if (longRun) rows += priceRow('Extended run', ((P.run_ft || 20) - 20) + ' extra feet', fmt(longRun));
    rows += priceRow('Permit & inspection', 'Filed with your local jurisdiction', fmt(permit));
    if (cord) rows += priceRow('Power transfer cord', (chosenAmp === '50' ? '50' : '30') + 'A compatible', fmt(cord));
    if (mb) rows += priceRow('Main breaker replacement', 'Upgraded to current code', fmt(mb));
    if (tq) rows += priceRow('Panel space optimization', 'Twin/quad breaker swap', fmt(tq));
  } else {
    rows += priceRow('Base installation', 'Inlet box, interlock kit, permit, inspection, walkthrough', fmt(pr.base || P.price_base));
    if (P.include_cord) rows += priceRow('Power transfer cord', 'Connects generator to inlet box', fmt(P.price_cord));
    if (P.include_surge) rows += priceRow('Whole-house surge protector', 'Installed on main panel', fmt(P.price_surge));
  }

  if (surgeOn && !P.include_surge) {
    rows += priceRow('Whole-home surge protector', 'Installed on main panel', fmt(surgePrice));
  }

  const total = calcTotal(chosenAmp);

  const body = document.getElementById('pricing-body');
  if (!body) return;
  body.innerHTML = `
    <table class="price-table">
      ${rows}
      <tr class="price-total-row">
        <td>Total</td>
        <td><span class="total-badge" id="total-badge">${fmt(total)}</span></td>
      </tr>
    </table>
    <div class="compare-box">
      Get backup power for your whole home &mdash; without the $15,000 standby generator.<br>
      <span>You already own the generator. We connect it the right way.</span>
    </div>`;

  const approveTotal = document.getElementById('approve-total');
  if (approveTotal) approveTotal.textContent = fmt(total);
}

function priceRow(name, desc, price) {
  return `<tr><td><div class="price-item-name">${esc(name)}</div><div class="price-item-desc">${esc(desc)}</div></td><td>${price}</td></tr>`;
}

// ── AMP TOGGLE ──────────────────────────────────────────────
function switchAmp(amp) {
  chosenAmp = amp;
  document.querySelectorAll('.amp-toggle-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().startsWith(amp === '30' ? '30' : '50'));
  });
  renderPricing();
}

// ── SURGE TOGGLE ────────────────────────────────────────────
function toggleSurge() {
  surgeOn = !surgeOn;
  const track = document.getElementById('surge-toggle');
  const label = document.getElementById('surge-price-label');
  if (track) track.classList.toggle('on', surgeOn);
  if (label) {
    label.classList.toggle('on', surgeOn);
    label.textContent = surgeOn
      ? 'Added to your proposal'
      : '+' + fmt(P.surge_price || 375) + ' \u00B7 protects $10,500+ in appliances';
  }
  renderPricing();
}

// ── VALIDATION ──────────────────────────────────────────────
function validateForm() {
  const name = (document.getElementById('signer-name')?.value || '').trim();

// ── APPROVE ─────────────────────────────────────────────────
let approving = false;
async function approveProposal() {
  if (approving) return;
  const name = document.getElementById('signer-name').value.trim();
  const err  = document.getElementById('approve-err');
  const btn  = document.getElementById('approve-btn');

  if (!name || !ackScope || !ackSafety) { err.textContent = 'Please complete all fields above.'; return; }

  approving = true;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner-large" style="width:20px;height:20px;border-width:2.5px;margin:0"></div> Submitting...';

  const ip = await getIP();
  const total = calcTotal(chosenAmp);

  const termsSnapshot = JSON.stringify({
    proposal_id: P.id,
    proposal_token: P.token,
    contact_name: P.contact_name,
    contact_address: P.contact_address,
    selected_amp: chosenAmp,
    selected_surge: surgeOn,
    surge_price: surgeOn ? (P.surge_price || 375) : 0,
    pricing: getPrice(chosenAmp),
    total: total,
    scope_acknowledged: true,
    safety_acknowledged: true,
    signer_name: name,
    signed_at: new Date().toISOString(),
    ip_address: ip,
    user_agent: navigator.userAgent,
  });

  const { error } = await db.from('proposals').update({
    status: 'Approved',
    signed_at: new Date().toISOString(),
    signer_name: name,
    safety_ack: true,
    selected_amp: chosenAmp,
    selected_surge: surgeOn,
    total: total,
    approved_ip: ip,
    approved_user_agent: navigator.userAgent,
    approved_terms_snapshot: termsSnapshot,
    is_locked: true,
  }).eq('token', P.token);

  if (error) {
    err.textContent = 'Something went wrong. Please try again or call (864) 400-5302.';
    btn.disabled = false;
    approving = false;
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Approve Proposal &mdash; <span id="approve-total">' + fmt(calcTotal(chosenAmp)) + '</span>';
    return;
  }

  P.status = 'Approved';
  P.signer_name = name;
  P.signed_at = new Date().toISOString();
  P.selected_amp = chosenAmp;
  P.selected_surge = surgeOn;
  P.total = total;
  P.approved_ip = ip;
  renderApproved();
}

        1. <strong>Never operate a generator indoors</strong> &mdash; including garages, basements, or enclosed spaces. Carbon monoxide is deadly and odorless.<br><br>
        2. <strong>Place generator at least 20 feet from your home</strong> with exhaust pointing away from windows, doors, and vents.<br><br>
        3. <strong>Use only the installed inlet connection</strong> to connect your generator. Never use extension cords to back-feed your panel.<br><br>
        4. <strong>Turn OFF the generator before refueling.</strong> Allow it to cool for at least 2 minutes before adding fuel.<br><br>
        5. <strong>Follow the interlock procedure:</strong> Turn OFF the main breaker, then turn ON the generator breaker. Reverse this order when disconnecting.<br><br>
        6. <strong>Never exceed your generator's rated capacity.</strong> Turn off high-draw appliances when starting the generator, then add loads gradually.<br><br>
        7. <strong>Keep the generator dry.</strong> Use a canopy if operating in rain. Never touch the generator with wet hands.<br><br>
        8. <strong>Inspect your cord before each use.</strong> Check for damage, cracks, or exposed wiring. Replace immediately if damaged.
      </div>

  `;

  const container = document.createElement('div');
  container.innerHTML = html;
  document.body.appendChild(container);

  const customerName = (P.contact_name || 'Proposal').replace(/[^a-zA-Z0-9]/g, '-');
  const restoreBtn = () => {
    downloading = false;
    if (dlBtn) { dlBtn.disabled = false; dlBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Proposal PDF'; }
  };
  html2pdf().set({
    margin: [10, 12, 10, 12],
    filename: 'BPP-Proposal-' + customerName + '.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'letter', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all'] }
  }).from(container).save().then(() => {
    document.body.removeChild(container);
    restoreBtn();
  }).catch(() => {
    if (container.parentNode) document.body.removeChild(container);
    restoreBtn();
  });
}

function pdfRow(name, price) {
  return `<tr><td style="padding:6px 0;color:#4a5568">${name}</td><td style="padding:6px 0;font-weight:600;text-align:right">${price}</td></tr>`;
}

// ── ERROR ───────────────────────────────────────────────────
function showError(title, msg) {
  document.getElementById('main').innerHTML = `
    <div class="state-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <h2>${title}</h2>
      <p>${msg}</p>
    </div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
